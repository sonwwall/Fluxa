services:
  mysql:
    image: mysql:8.4
    container_name: ${FLUXA_CONTAINER_PREFIX:-fluxa}-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${FLUXA_MYSQL_ROOT_PASSWORD:?set FLUXA_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${FLUXA_MYSQL_DATABASE:-fluxa}
      MYSQL_USER: ${FLUXA_MYSQL_USER:-fluxa}
      MYSQL_PASSWORD: ${FLUXA_MYSQL_PASSWORD:?set FLUXA_MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "${FLUXA_MYSQL_PORT:-3306}:3306"
    volumes:
      - fluxa_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  fluxa_mysql_data:
