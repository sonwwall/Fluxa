services:
  migrate:
    image: mysql:8.4
    container_name: ${FLUXA_CONTAINER_PREFIX:-fluxa}-migrate
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      FLUXA_MYSQL_DATABASE: ${FLUXA_MYSQL_DATABASE:-fluxa}
      FLUXA_MYSQL_PASSWORD: ${FLUXA_MYSQL_PASSWORD:?set FLUXA_MYSQL_PASSWORD}
      FLUXA_MYSQL_USER: ${FLUXA_MYSQL_USER:-fluxa}
      MYSQL_PWD: ${FLUXA_MYSQL_PASSWORD:?set FLUXA_MYSQL_PASSWORD}
    command:
      - sh
      - -c
      - mysql -h mysql -P 3306 -u"$${FLUXA_MYSQL_USER}" "$${FLUXA_MYSQL_DATABASE}" < /app/migrations/001_init_public_blog.sql
    volumes:
      - ./fluxa-server/migrations:/app/migrations:ro
    restart: "no"

  server:
    image: ${FLUXA_SERVER_IMAGE:?set FLUXA_SERVER_IMAGE}
    container_name: ${FLUXA_CONTAINER_PREFIX:-fluxa}-server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      FLUXA_SERVER_ENVIRONMENT: ${FLUXA_SERVER_ENVIRONMENT:-production}
      FLUXA_DATABASE_HOST: mysql
      FLUXA_DATABASE_PORT: 3306
      FLUXA_DATABASE_USERNAME: ${FLUXA_MYSQL_USER:-fluxa}
      FLUXA_DATABASE_PASSWORD: ${FLUXA_MYSQL_PASSWORD:?set FLUXA_MYSQL_PASSWORD}
      FLUXA_DATABASE_DATABASE: ${FLUXA_MYSQL_DATABASE:-fluxa}
      FLUXA_JWT_SECRET: ${FLUXA_JWT_SECRET:?set FLUXA_JWT_SECRET}
      FLUXA_LOG_ENCODING: ${FLUXA_LOG_ENCODING:-json}
    ports:
      - "${FLUXA_SERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    image: ${FLUXA_WEB_IMAGE:?set FLUXA_WEB_IMAGE}
    container_name: ${FLUXA_CONTAINER_PREFIX:-fluxa}-web
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_BASE_URL: ${API_BASE_URL:-http://server:8080}
    ports:
      - "${FLUXA_WEB_PORT:-3000}:3000"
